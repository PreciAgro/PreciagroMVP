[mypy]
python_version = 3.11
warn_unused_configs = True
ignore_missing_imports = True
allow_redefinition = True

# Newly touched modules opt into stricter checks gradually.
[mypy-preciagro.packages.engines.geo_context.test_endpoints]
disallow_incomplete_defs = True
disallow_untyped_defs = True

[mypy-preciagro.packages.engines.temporal_logic.tests.test_simple]
disallow_untyped_defs = True

[mypy-preciagro.packages.engines.temporal_logic.compiler]
disallow_untyped_defs = True
