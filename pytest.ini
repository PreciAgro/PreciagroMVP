[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Coverage options
addopts =
    --cov=preciagro
    --cov-report=html
    --cov-report=term-missing
    --cov-report=json
    --cov-fail-under=60
    -v
    --tb=short
filterwarnings = 
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
