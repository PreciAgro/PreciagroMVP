version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: preciagro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  cie:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - backend/app/preciagro/packages/engines/crop_intelligence/.env.example
    ports:
      - "8082:8082"
    depends_on:
      - postgres
