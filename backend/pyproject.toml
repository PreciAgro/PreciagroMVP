[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
combine_as_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E203", "E266", "E501"]

[tool.ruff.lint.per-file-ignores]
"app/preciagro/packages/engines/temporal_logic/contracts_old.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
ignore_missing_imports = true
allow_redefinition = true

[tool.pytest.ini_options]
addopts = "-ra"
python_files = ["test_*.py"]
